<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口是心非 - 兒童排體驗活動</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入 SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- 引入 Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f0f8ff; font-family: 'Microsoft JhengHei', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .kid-btn { margin: 5px; font-size: 1.2rem; border-radius: 20px; }
        .action-hint { font-size: 1.5rem; color: #d63384; font-weight: bold; background: #ffe6f2; padding: 10px; border-radius: 10px;}
        .encourage-text { font-size: 1.2rem; color: #198754; font-weight: bold; }
        #canvas-container { max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    <h1 class="text-center text-primary mb-4">✨ 口是心非 - 兒童排體驗活動 ✨</h1>

    <!-- 畫面 1：設定參加名單 -->
    <div id="screen-setup" class="screen active card p-4">
        <h3 class="text-center mb-3">請勾選今天有來參加的小朋友</h3>
        <div id="kids-checkboxes" class="d-flex flex-wrap justify-content-center mb-4">
            <!-- 動態生成 -->
        </div>
        <div class="text-center">
            <button class="btn btn-primary btn-lg" onclick="startGame()">開始遊戲 🚀</button>
        </div>
    </div>

    <!-- 畫面 2：選擇下一位答題的小朋友 -->
    <div id="screen-select-kid" class="screen card p-4">
        <h3 class="text-center mb-3">請選擇下一位挑戰者</h3>
        <div id="remaining-kids" class="d-flex flex-wrap justify-content-center mb-4">
            <!-- 動態生成 -->
        </div>
        <div class="text-center">
            <button class="btn btn-secondary" onclick="showDashboard(false)">查看目前儀表板 📊</button>
        </div>
    </div>

    <!-- 畫面 3：遊戲進行中 -->
    <div id="screen-game" class="screen card p-4 text-center">
        <h2 id="current-kid-name" class="text-success mb-3">小朋友名字</h2>
        <h5 class="text-muted">第 <span id="q-current">1</span> / 5 題</h5>
        
        <div class="my-4">
            <h3 id="question-text" class="mb-4">題目內容</h3>
            <div class="action-hint">
                <span id="correct-action">動作提示</span>
            </div>
        </div>

        <div class="mt-4">
            <p class="text-muted">服事者請點選：小朋友做對了嗎？</p>
            <button class="btn btn-success btn-lg mx-2" onclick="answer(true)">✅ 做對了</button>
            <button class="btn btn-danger btn-lg mx-2" onclick="answer(false)">❌ 做錯了</button>
        </div>
    </div>

    <!-- 畫面 4：動態儀表板 -->
    <div id="screen-dashboard" class="screen card p-4">
        <h2 class="text-center text-primary mb-3">📊 戰況儀表板</h2>
        <div id="canvas-container">
            <canvas id="scoreChart"></canvas>
        </div>
        <div class="text-center mt-4" id="dashboard-actions">
            <!-- 動態生成按鈕 -->
        </div>
    </div>

    <!-- 畫面 5：最終排名 -->
    <div id="screen-final" class="screen card p-4">
        <h2 class="text-center text-danger mb-4">🏆 最終排名與頒獎 🏆</h2>
        <div id="ranking-list" class="list-group mb-4" style="max-width: 400px; margin: 0 auto;">
            <!-- 動態生成 -->
        </div>
        <div class="text-center">
            <h4 class="text-success mb-3">感謝主！大家都非常棒，都是操練真實敞開的好孩子！</h4>
            <button class="btn btn-primary" onclick="location.reload()">重新開始遊戲</button>
        </div>
    </div>

</div>

<script>
    // --- 資料設定 ---
    const allKids = ["知愛", "沛馨", "坤穎", "坤翰", "鉉忠", "芊妤", "牧謙", "筠縢", "嘉晨"];
    const encouragements = [
        "太棒了！主耶穌愛你！", "做得很好！要繼續操練靈喔！", "沒關係，我們再試一次！", 
        "好厲害！你真是一個真實的人！", "很棒喔！記得把一切告訴主耶穌！", "讚！清心的人有福了！",
        "真棒！主耶穌就在你裡面！", "神是又真又活的神，你也是又棒又乖的孩子！"
    ];

    // 50個題目 (結合生活常識與文件內容，O為true，X為false)
    const questionBank = [
        // 生活與常識
        { text: "天空通常是藍色的。", ans: true },
        { text: "蘋果吃起來全部都是苦的。", ans: false },
        { text: "小狗會汪汪叫。", ans: true },
        { text: "貓咪會發出哞哞的牛叫聲。", ans: false },
        { text: "冰塊摸起來是熱的。", ans: false },
        { text: "太陽是從東邊升起的。", ans: true },
        { text: "魚是在土裡游泳的。", ans: false },
        { text: "鳥兒可以在天上飛。", ans: true },
        // 關於真與神
        { text: "真實就是真理、真誠、信實。", ans: true },
        { text: "撒但是說謊之人的父。", ans: true },
        { text: "真的人就是被神充滿、表裡一致的人。", ans: true },
        { text: "撒但是誠實之人的父。", ans: false },
        { text: "神是又活又真的神。", ans: true },
        { text: "清心的人必看不見神。", ans: false },
        { text: "聖經說：清心的人有福了。", ans: true },
        // 關於接觸神與禱告
        { text: "基督是活的救主和那靈。", ans: true },
        { text: "我們要用『頭腦』來接觸神，不用操練靈。", ans: false },
        { text: "禱告就像小孩子來到母親那裡一樣簡單。", ans: true },
        { text: "禱告一定要作很長、很複雜的文章。", ans: false },
        { text: "主耶穌是聽禱告的神。", ans: true },
        { text: "我們可以把難處和憂傷告訴主耶穌。", ans: true },
        { text: "只有開心的時候才可以跟主耶穌說話。", ans: false },
        { text: "如果我們做錯事，可以向主耶穌認罪。", ans: true },
        { text: "我們想去看電影，不需要告訴主耶穌。", ans: false },
        { text: "在禱告時向主真實敞開，是最好的禱告。", ans: true },
        // 關於芳羽的故事 (文件內容)
        { text: "芳羽的腦幹長了腫瘤。", ans: true },
        { text: "芳羽生病時，弟兄姊妹會來她家陪她唱詩禱告。", ans: true },
        { text: "芳羽在醫院開刀時，沒有人幫她禱告。", ans: false },
        { text: "芳羽最喜歡做的事是寫『鼓勵本』。", ans: true },
        { text: "芳羽覺得去兒童排聚會很無聊。", ans: false },
        { text: "鼓勵本就像芳羽跟主耶穌的交換日記。", ans: true },
        { text: "芳羽的鼓勵本裡面只有畫畫，沒有寫字。", ans: false },
        { text: "芳羽睡醒時會跟姑姑說「主耶穌愛你」。", ans: true },
        { text: "芳羽上英語課前，不敢跟老師一起呼求主名。", ans: false },
        { text: "芳羽輸血覺得痛的時候，會呼求主名。", ans: true },
        { text: "芳羽輸血時因為很痛，就放棄了禱告。", ans: false },
        { text: "芳羽生氣打人之後，有向主耶穌認罪。", ans: true },
        { text: "芳羽生氣打人之後，覺得自己一點錯都沒有。", ans: false },
        { text: "芳羽生病時還不斷寫卡片傳揚福音。", ans: true },
        { text: "芳羽生病的時候從來不禱告。", ans: false },
        { text: "芳羽最後一句話是「主耶穌，我愛祢」。", ans: true },
        { text: "芳羽的故事告訴我們，有事要對主耶穌隱瞞。", ans: false },
        { text: "芳羽在化療期間，還是很期待參加兒童排。", ans: true },
        { text: "藉著呼求禱告，芳羽經歷主減輕她的痛苦。", ans: true },
        { text: "芳羽在世上活了八十歲才安睡在主懷裡。", ans: false },
        // 延伸操練
        { text: "喜怒哀樂都可以真實地告訴主耶穌。", ans: true },
        { text: "恨別人的時候，絕對不能跟主耶穌說。", ans: false },
        { text: "只要與神說話，祂會幫助我們放下仇恨。", ans: true },
        { text: "主耶穌就住在我們最深處的靈裡。", ans: true },
        { text: "學習向基督說話，不要向祂隱瞞什麼。", ans: true }
    ];

    // --- 狀態變數 ---
    let activeKids = [];
    let playedKids = [];
    let scores = {};
    let currentKid = "";
    let currentQuestions = [];
    let qIndex = 0;
    let chartInstance = null;

    // --- 初始化 ---
    window.onload = () => {
        const checkboxDiv = document.getElementById("kids-checkboxes");
        allKids.forEach(kid => {
            checkboxDiv.innerHTML += `
                <div class="form-check m-2">
                    <input class="form-check-input" type="checkbox" value="${kid}" id="chk-${kid}" checked>
                    <label class="form-check-label fs-5" for="chk-${kid}">${kid}</label>
                </div>
            `;
        });
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- 遊戲流程 ---
    function startGame() {
        const checkboxes = document.querySelectorAll('#kids-checkboxes input:checked');
        activeKids = Array.from(checkboxes).map(cb => cb.value);
        
        if (activeKids.length === 0) {
            Swal.fire('錯誤', '請至少選擇一位小朋友', 'error');
            return;
        }

        activeKids.forEach(kid => scores[kid] = 0);
        renderKidSelection();
        showScreen('screen-select-kid');
        initChart();
    }

    function renderKidSelection() {
        const div = document.getElementById("remaining-kids");
        div.innerHTML = "";
        const remaining = activeKids.filter(k => !playedKids.includes(k));
        
        remaining.forEach(kid => {
            div.innerHTML += `<button class="btn btn-outline-primary kid-btn" onclick="startTurn('${kid}')">${kid}</button>`;
        });
    }

    function startTurn(kid) {
        currentKid = kid;
        qIndex = 0;
        
        // 隨機挑選5題
        let shuffled = [...questionBank].sort(() => 0.5 - Math.random());
        currentQuestions = shuffled.slice(0, 5);
        
        document.getElementById("current-kid-name").innerText = `⭐ 現在輪到：${kid} ⭐`;
        loadQuestion();
        showScreen('screen-game');
    }

    function loadQuestion() {
        const q = currentQuestions[qIndex];
        document.getElementById("q-current").innerText = qIndex + 1;
        document.getElementById("question-text").innerText = q.text;
        
        const hintBox = document.getElementById("correct-action");
        if (q.ans) {
            hintBox.innerHTML = `正確答案是【對】<br>👧👦 小朋友要：<span class="text-primary">嘴巴說「對」，但「搖頭(X)」</span>`;
        } else {
            hintBox.innerHTML = `正確答案是【錯】<br>👧👦 小朋友要：<span class="text-primary">嘴巴說「錯」，但「點頭(O)」</span>`;
        }
    }

    function answer(isCorrect) {
        if (isCorrect) {
            scores[currentKid]++;
        }
        
        // 隨機鼓勵語
        const encourageMsg = encouragements[Math.floor(Math.random() * encouragements.length)];
        
        Swal.fire({
            title: isCorrect ? '答對了！🎉' : '答錯了！沒關係！',
            text: encourageMsg,
            icon: isCorrect ? 'success' : 'info',
            timer: 2000,
            showConfirmButton: false
        }).then(() => {
            qIndex++;
            if (qIndex < 5) {
                loadQuestion();
            } else {
                endTurn();
            }
        });
    }

    function endTurn() {
        playedKids.push(currentKid);
        Swal.fire('完成挑戰！', `${currentKid} 獲得了 ${scores[currentKid]} 分！`, 'success').then(() => {
            showDashboard(true);
        });
    }

    // --- 儀表板與圖表 ---
    function initChart() {
        const ctx = document.getElementById('scoreChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: activeKids,
                datasets: [{
                    label: '答對題數',
                    data: activeKids.map(() => 0),
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, max: 5, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    function updateChart() {
        chartInstance.data.datasets[0].data = activeKids.map(k => scores[k]);
        chartInstance.update();
    }

    function showDashboard(fromGame) {
        updateChart();
        const actionsDiv = document.getElementById("dashboard-actions");
        
        if (playedKids.length < activeKids.length) {
            renderKidSelection();
            actionsDiv.innerHTML = `
                <button class="btn btn-primary btn-lg" onclick="showScreen('screen-select-kid')">請下一位挑戰者出場</button>
            `;
        } else {
            actionsDiv.innerHTML = `
                <button class="btn btn-danger btn-lg" onclick="showFinalRanking()">查看最終排名 🏆</button>
            `;
        }
        showScreen('screen-dashboard');
    }

    // --- 最終排名 ---
    function showFinalRanking() {
        const listDiv = document.getElementById("ranking-list");
        listDiv.innerHTML = "";
        
        // 依分數排序
        let sortedKids = activeKids.slice().sort((a, b) => scores[b] - scores[a]);
        
        let rank = 1;
        sortedKids.forEach((kid, index) => {
            if (index > 0 && scores[kid] < scores[sortedKids[index-1]]) {
                rank = index + 1;
            }
            let badge = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '🏅';
            
            listDiv.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center fs-5">
                    <span>${badge} 第 ${rank} 名：${kid}</span>
                    <span class="badge bg-primary rounded-pill">${scores[kid]} 分</span>
                </div>
            `;
        });
        
        showScreen('screen-final');
    }
</script>
</body>
</html>
